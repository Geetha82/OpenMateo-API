<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="CSS/index.css">
</head>

<body>
    <div class="container">
        <div class="input-group">
            <input type="text" id="city-input" placeholder="Enter city (e.g. London)" value="London">
            <button id="fetch-btn">Get Weather</button>
        </div>

        <nav class="weather-nav">
            <a href="#" class="nav-link active" data-target="temp-section">Temperature</a>
            <a href="#" class="nav-link" data-target="wind-section">Wind Speed</a>
        </nav>

        <div id="temp-section" class="content-box">
            <h2>Current Temperature</h2>
            <p><span id="temp-val">--</span>°F</p>
        </div>

        <div id="wind-section" class="content-box hidden">
            <h2>Current Wind Speed</h2>
            <p><span id="wind-val">--</span> mph</p>
        </div>
    </div>
    <script src="js/index.js"></script>
</body>

</html>
